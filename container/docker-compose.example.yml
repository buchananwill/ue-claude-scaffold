# Template docker-compose for a single agent.
# Copy to docker-compose.yml and adjust paths, or use launch.sh which generates this.

services:
  claude-worker:
    build:
      context: .
    environment:
      - AGENT_NAME=${AGENT_NAME:-agent-1}
      - WORK_BRANCH=${WORK_BRANCH:-main}
      - AGENT_TYPE=${AGENT_TYPE:-container-orchestrator}
      - MAX_TURNS=${MAX_TURNS:-200}
      - SERVER_URL=http://host.docker.internal:${SERVER_PORT:-9100}
      - TASK_PROMPT_FILE=/task/prompt.md
      # Hook config — set these to match your project's build/test scripts
      - BUILD_SCRIPT_NAME=${BUILD_SCRIPT_NAME:-build.py}
      - TEST_SCRIPT_NAME=${TEST_SCRIPT_NAME:-run_tests.py}
      - DEFAULT_TEST_FILTERS=${DEFAULT_TEST_FILTERS:-}
      - LOG_VERBOSITY=${LOG_VERBOSITY:-normal}
      - WORKER_MODE=${WORKER_MODE:-false}
      - WORKER_POLL_INTERVAL=${WORKER_POLL_INTERVAL:-30}
      - WORKER_SINGLE_TASK=${WORKER_SINGLE_TASK:-true}
    volumes:
      # Required: bare repo for git operations
      - ${BARE_REPO_PATH:?Set BARE_REPO_PATH}:/repo.git
      # Required: task prompt and standing instructions
      - ${TASKS_PATH:?Set TASKS_PATH}:/task:ro
      # Required: Claude authentication (pick one)
      # Option A — OAuth credentials file (CLAUDE_CREDENTIALS_PATH must be set in .env
      # — ~ does not expand reliably on Windows):
      - ${CLAUDE_CREDENTIALS_PATH:?Set CLAUDE_CREDENTIALS_PATH in .env}:/home/claude/.claude/.credentials.json:ro
      # Option B — API key: set ANTHROPIC_API_KEY in environment above instead
      # Agent definitions (container-orchestrator, etc.)
      - ${AGENTS_PATH:-../agents}:/home/claude/.claude/agents:ro
      # Optional: workspace patching config (path remaps, agent substitutions).
      # Create from scaffold.config.example.json before running compose.
      # If this file does not exist, Docker will create an empty directory at the
      # mount path — remove it and create the file, or remove this mount line.
      - ../scaffold.config.json:/config/scaffold.config.json:ro
      # UE engine (read-only)
      - ${UE_ENGINE_PATH:?Set UE_ENGINE_PATH}:/engine:ro
      # Optional: read-only plugin mounts (symlinked into Plugins/ at startup)
      # Add entries like:
      # - /path/to/MyPlugin:/plugins-ro/MyPlugin:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
